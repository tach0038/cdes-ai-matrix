  // Autodesk Forma
  [9,34],[9,0],
  // Enscape
  [12,0],[12,26],
  // Vizcom
  [17,21],[17,23],
  // Fusion 360
  [18,22],[18,24],
  // SolidWorks
  [19,23],
  // Miro AI
  [25,5],[25,44],
  // Veras
  [28,12],[28,0],
  // Dovetail
  [44,45],[44,46],
  // Maze
  [45,5],[45,46],
  // D5 Render
  [31,12],[31,0],
  // Apparel cluster
  [39,40],[40,41],[41,3],
  // Trend cluster
  [41,42],[42,43],
  // HFE cluster
  [44,47],[47,48],[48,0],
  // UX cluster
  [5,49],[49,14],[49,16],
];

// ── CANVAS SETUP ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('universe');

let W, H, dpr;
let nodes = [];
let activeFilter = 'all';
let hoveredNode = null;
let simRunning = true;

// Pan/zoom state
let panX = 0, panY = 0, zoom = 1;
let isDragging = false, lastMX = 0, lastMY = 0;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (nodes.length === 0) initNodes();
}

function initNodes() {
  // Arrange in loose clusters by primary discipline
  const clusterCenters = {
    'Architecture':           { x: 0.22, y: 0.25 },
    'Interior Design':        { x: 0.18, y: 0.55 },
    'Landscape Architecture': { x: 0.12, y: 0.75 },
    'Product Design':         { x: 0.45, y: 0.18 },
    'Graphic Design':         { x: 0.72, y: 0.22 },
    'Apparel Design':         { x: 0.80, y: 0.55 },
    'Retail Merchandising':   { x: 0.82, y: 0.78 },
    'Human Factors':          { x: 0.55, y: 0.82 },
    'UX Design':              { x: 0.68, y: 0.68 },
    'All':                    { x: 0.50, y: 0.50 },
  };

  nodes = TOOLS.map((t, i) => {
    const primaryDisc = t.discs.includes('All') ? 'All' : t.discs[0];
    const center = clusterCenters[primaryDisc] || { x: 0.5, y: 0.5 };
    const spread = t.discs.includes('All') ? 0.06 : 0.12;
    return {
      tool: t,
      x: (center.x + (Math.random() - 0.5) * spread) * W,
      y: (center.y + (Math.random() - 0.5) * spread) * H,
      vx: 0, vy: 0,
      r: t.size,
      targetAlpha: 1,
      alpha: 1,
    };
  });

  document.getElementById('conn-count').textContent = EDGE_PAIRS.length;
  document.getElementById('tool-count').textContent = TOOLS.length;
}

// ── FORCE SIMULATION ─────────────────────────────────────────────────────────
function simulate() {
  if (!simRunning) return;
  const k = 0.008;
  const repulse = 1800;
  const attract = 0.018;
  const centerX = W / 2, centerY = H / 2;

  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];

    // Repulsion between nodes
    for (let j = i + 1; j < nodes.length; j++) {
      const b = nodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const minDist = a.r + b.r + 18;
      if (dist < minDist * 2) {
        const f = repulse / (dist * dist);
        const fx = (dx / dist) * f;
        const fy = (dy / dist) * f;
        a.vx += fx; a.vy += fy;
        b.vx -= fx; b.vy -= fy;
      }
    }

    // Edge attraction
    EDGE_PAIRS.forEach(([ii, jj]) => {
      if (ii === i || jj === i) {
        const other = nodes[ii === i ? jj : ii];
        const dx = other.x - a.x, dy = other.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const idealLen = 120;
        const f = (dist - idealLen) * attract;
        a.vx += (dx / dist) * f;
        a.vy += (dy / dist) * f;
      }
    });

    // Gentle center gravity
    a.vx += (centerX - a.x) * 0.0004;
    a.vy += (centerY - a.y) * 0.0004;

    // Damping
    a.vx *= 0.82; a.vy *= 0.82;
    a.x += a.vx; a.y += a.vy;

    // Boundary
    const pad = a.r + 20;
    if (a.x < pad) { a.x = pad; a.vx *= -0.5; }
    if (a.x > W - pad) { a.x = W - pad; a.vx *= -0.5; }
    if (a.y < pad) { a.y = pad; a.vy *= -0.5; }
    if (a.y > H - pad) { a.y = H - pad; a.vy *= -0.5; }
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────────
function getNodeColor(tool) {
  if (tool.discs.includes('All')) return DISC_COLORS['All'];
  return DISC_COLORS[tool.discs[0]] || '#888';
}

function nodeVisible(node) {
  if (activeFilter === 'all') return true;
  return node.tool.discs.includes(activeFilter) || node.tool.discs.includes('All');
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  // Draw edges
  EDGE_PAIRS.forEach(([ii, jj]) => {
    const a = nodes[ii], b = nodes[jj];
    if (!a || !b) return;
    const aVis = nodeVisible(a), bVis = nodeVisible(b);
    const alpha = (aVis && bVis) ? 0.12 : 0.03;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach((node, i) => {
    const visible = nodeVisible(node);
    const isHovered = hoveredNode === i;
    const color = getNodeColor(node.tool);
    const alpha = visible ? 1 : 0.1;

    ctx.globalAlpha = alpha;

    // Glow for hovered
    if (isHovered) {
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.r + 10, 0, Math.PI * 2);
      const grd = ctx.createRadialGradient(node.x, node.y, node.r, node.x, node.y, node.r + 10);
      grd.addColorStop(0, color + '40');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Node fill
    ctx.beginPath();
    ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);

    if (isHovered) {
      ctx.fillStyle = color;
    } else {
      // Dark fill with colored border
      ctx.fillStyle = '#0F1217';
    }
    ctx.fill();

    // Border
    ctx.beginPath();
    ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
    ctx.strokeStyle = isHovered ? color : (visible ? color + 'AA' : color + '22');
    ctx.lineWidth = isHovered ? 1.5 : 0.8;
    ctx.stroke();

    // Label
    const fontSize = Math.max(8, Math.min(node.r * 0.48, 11));
    ctx.font = `${isHovered ? '500' : '400'} ${fontSize}px 'DM Sans', sans-serif`;
    ctx.fillStyle = isHovered ? '#0A0C0F' : (visible ? color : color + '33');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const words = node.tool.name.split(' ');
    if (words.length > 2 && node.r < 16) {
      ctx.fillText(words[0], node.x, node.y - fontSize * 0.6);
      ctx.fillText(words.slice(1).join(' '), node.x, node.y + fontSize * 0.6);
    } else if (words.length > 1 && node.name > 14 && node.r < 14) {
      ctx.fillText(words[0], node.x, node.y - fontSize * 0.6);
      ctx.fillText(words.slice(1).join(' '), node.x, node.y + fontSize * 0.6);
    } else {
      ctx.fillText(node.tool.name, node.x, node.y);
    }

    ctx.globalAlpha = 1;
  });

  ctx.restore();
}

// ── ANIMATION LOOP ────────────────────────────────────────────────────────────
let frame = 0;
function loop() {
  requestAnimationFrame(loop);
  if (frame++ < 300) simulate(); // Run physics for first 300 frames then settle
  draw();
}

// ── INTERACTION ──────────────────────────────────────────────────────────────
function screenToWorld(sx, sy) {
  return { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (isDragging) {
    panX += mx - lastMX;
    panY += my - lastMY;
    lastMX = mx; lastMY = my;
    return;
  }

  const { x: wx, y: wy } = screenToWorld(mx, my);
  let found = null;
  nodes.forEach((node, i) => {
    const dist = Math.hypot(wx - node.x, wy - node.y);
    if (dist < node.r + 4) found = i;
  });

  hoveredNode = found;
  canvas.style.cursor = found !== null ? 'pointer' : 'grab';

  const tt = document.getElementById('tooltip');
  if (found !== null) {
    const node = nodes[found];
    const t = node.tool;
    const color = getNodeColor(t);

    document.getElementById('tt-name').textContent = t.name;
    document.getElementById('tt-vendor').textContent = t.vendor;

    const flagEl = document.getElementById('tt-flag');
    flagEl.className = 'tt-flag ' + (t.flag === 'native' ? 'flag-native' : 'flag-enhanced');
    flagEl.textContent = t.flag === 'native' ? 'AI-native' : 'AI-enhanced';

    const tagsEl = document.getElementById('tt-tags');
    tagsEl.innerHTML = '';
    const discsToShow = t.discs.includes('All') ? Object.keys(DISC_COLORS).filter(d => d !== 'All').slice(0,4) : t.discs.slice(0,3);
    discsToShow.forEach(d => {
      const tag = document.createElement('div');
      tag.className = 'tt-tag';
      tag.textContent = d;
      const c = DISC_COLORS[d] || '#888';
      tag.style.background = c + '18';
      tag.style.color = c;
      tag.style.borderColor = c + '44';
      tagsEl.appendChild(tag);
    });
    if (t.discs.includes('All')) {
      const tag = document.createElement('div');
      tag.className = 'tt-tag';
      tag.textContent = 'All disciplines';
      tag.style.background = '#C8F06018';
      tag.style.color = '#C8F060';
      tag.style.borderColor = '#C8F06044';
      tagsEl.appendChild(tag);
    }

    document.getElementById('tt-cap').textContent = t.cap;

    let tx = e.clientX + 16;
    let ty = e.clientY - 10;
    if (tx + 250 > window.innerWidth) tx = e.clientX - 260;
    if (ty + 200 > window.innerHeight) ty = e.clientY - 190;
    tt.style.left = tx + 'px';
    tt.style.top = ty + 'px';
    tt.style.display = 'block';
  } else {
    tt.style.display = 'none';
  }
});

canvas.addEventListener('mousedown', e => {
  if (hoveredNode === null) {
    isDragging = true;
    const rect = canvas.getBoundingClientRect();
    lastMX = e.clientX - rect.left;
    lastMY = e.clientY - rect.top;
  }
});

canvas.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  hoveredNode = null;
  document.getElementById('tooltip').style.display = 'none';
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.max(0.3, Math.min(3, zoom * delta));
  panX = mx - (mx - panX) * (newZoom / zoom);
  panY = my - (my - panY) * (newZoom / zoom);
  zoom = newZoom;
}, { passive: false });

// Filter buttons
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = 'transparent';
    b.style.color = 'var(--text2)';
    b.style.borderColor = 'var(--border2)';
  });
  btn.classList.add('active');
  if (activeFilter === 'all') {
    btn.style.background = '#C8F060';
    btn.style.color = '#0A0C0F';
    btn.style.borderColor = '#C8F060';
  } else {
    const color = DISC_COLORS[activeFilter] || '#C8F060';
    btn.style.background = color;
    btn.style.color = '#0A0C0F';
    btn.style.borderColor = color;
  }
  frame = 0; // Re-run a few physics frames on filter change
});

// Legend clicks
document.getElementById('legend').addEventListener('click', e => {
  const item = e.target.closest('.legend-item');
  if (!item) return;
  const btn = document.querySelector(`[data-filter="${item.dataset.filter}"]`);
  if (btn) btn.click();
});

function openSubmit() {
  window.open('https://docs.google.com/spreadsheets/d/1Vl_x9QpvNc965y0BlEZaSH3LSqrySvNP', '_blank');
}

// ── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => { resize(); });
resize();
loop();
</script>
